      (() => {
        const enhance = () => {
          const blocks = document.querySelectorAll('pre.astro-code, pre.shiki');
          for (const pre of blocks) {
            if (pre.parentElement?.classList.contains('code-block')) continue;
            const lang = pre.getAttribute('data-language') || 'text';

            const wrap = document.createElement('div');
            wrap.className = 'code-block';

            const header = document.createElement('div');
            header.className = 'code-block-header';

            const langSpan = document.createElement('span');
            langSpan.className = 'code-block-lang';
            langSpan.textContent = lang;

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'code-block-copy';
            btn.setAttribute('aria-label', 'copy code to clipboard');
            btn.textContent = 'copy';
            btn.addEventListener('click', async () => {
              const code = pre.querySelector('code')?.innerText ?? pre.innerText;
              try {
                await navigator.clipboard.writeText(code);
                btn.textContent = 'copied';
                btn.classList.add('is-copied');
              } catch {
                btn.textContent = 'failed';
              }
              setTimeout(() => {
                btn.textContent = 'copy';
                btn.classList.remove('is-copied');
              }, 1500);
            });

            header.appendChild(langSpan);
            header.appendChild(btn);
            pre.parentNode?.insertBefore(wrap, pre);
            wrap.appendChild(header);
            wrap.appendChild(pre);
          }
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', enhance, { once: true });
        } else {
          enhance();
        }
      })();
    </script>  <script>
      (() => {
        const BUDGET = 360;
        const collapse = () => {
          const cards = document.querySelectorAll('.card[data-href]');
          for (const card of cards) {
            const prose = card.querySelector('.card-body > .prose');
            if (!prose || prose.dataset.collapsed === '1') continue;
            const proseTop = prose.getBoundingClientRect().top;
            if (prose.getBoundingClientRect().height <= BUDGET) continue;

            const children = Array.from(prose.children);
            let cutAt = -1;
            for (let i = 0; i < children.length; i++) {
              const r = children[i].getBoundingClientRect();
              if (r.bottom - proseTop > BUDGET) { cutAt = i; break; }
            }
            if (cutAt === -1) continue;
            if (cutAt === 0) cutAt = 1;

            for (let i = cutAt; i < children.length; i++) {
              children[i].style.display = 'none';
            }

            const more = document.createElement('p');
            more.className = 'read-more-line';
            const a = document.createElement('a');
            a.className = 'read-more';
            a.href = card.dataset.href;
            a.textContent = 'read more →';
            more.appendChild(a);
            prose.appendChild(more);
            prose.dataset.collapsed = '1';
          }
        };
        const run = () => {
          collapse();
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(collapse);
          }
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', run, { once: true });
        } else {
          run();
        }
      })();
    </script>  <script>
      (() => {
        const mark = () => {
          const here = location.host;
          for (const a of document.querySelectorAll('a[href]')) {
            if (a.dataset.extMarked === '1') continue;
            const href = a.getAttribute('href');
            if (!href) continue;
            if (href.startsWith('#')) continue;
            if (href.startsWith('mailto:') || href.startsWith('tel:')) continue;
            let url;
            try { url = new URL(href, location.href); } catch { continue; }
            if (url.protocol !== 'http:' && url.protocol !== 'https:') continue;
            if (url.host === here) continue;
            a.target = '_blank';
            a.rel = (a.rel ? a.rel + ' ' : '') + 'noopener noreferrer';
            a.dataset.extMarked = '1';
          }
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', mark, { once: true });
